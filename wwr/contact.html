<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Rafting Company</title>
    <meta name="description"
        content="Get in touch with us for inquiries, reservations, or suggestions. Contact Rafting Company for more information.">
    <meta name="author" content="Thomas Moses">
    <link rel="stylesheet" href="styles/rafting.css">

</head>

<body>
    <header>
        <img src="images/logo.png" alt="Site Logo" class="logo">
        <nav class="navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>
        <section class="company-contact">
            <h3>Company Information</h3>
            <p>Address: 2nd floor, no 1 bechar street, zone 2 wuse, Abuja</p>
            <p>Phone: (+234) 90 6116 7172</p>
            <p>Email: <a href="mailto:contact@raftingcompany.com">contact@raftingcompany.com</a></p>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d3940.056030620134!2d7.465126!3d9.058654!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x104e0b19e1812f07%3A0x3c600c55287c9e29!2s9%20Bechar%20St%2C%20Zone%202%2C%20Abuja%20904101%2C%20Federal%20Capital%20Territory!5e0!3m2!1sen!2sng!4v1716679578506!5m2!1sen!2sng"
                width="600" height="450" class="map" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>

        </section>
        <section class="team">
            <h2>Our Team</h2>
            <figure class="employee-profile">
                <img src="images/john.jpg" alt="John Ayomi">
                <figcaption>John Ayomi, Tour Guide</figcaption>
            </figure>
            <figure class="employee-profile">
                <img src="images/jane.jpg" alt="Jane Smith">
                <figcaption>Jane Smith, Customer Service</figcaption>
            </figure>
            <figure class="employee-profile">
                <img src="images/Johnson.jpg" alt="Bob Johnson">
                <figcaption>Bob Johnson, Safety Officer</figcaption>
            </figure>
        </section>
        <section clss="contact-form">
            <h3>Contact Form</h3>
            <form action="#">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose of Message:</p>
                <label for="name"> General Inquiry</label>
                <input id="name" type="radio" name="purpose" value="general" required>
                <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
                <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <label><input type="checkbox" name="subscribe"> Please subscribe me to the monthly newsletter</label>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; Thomas Moses | 2024 | </p>
        <p><a href="wireframe-link.html">View Contact Us Wireframe</a></p>
        <nav class="sociallinks">
            <a href="https://facebook.com"><img src="images/facebook.webp" alt="facebook"></a>
            <a href="https://twitter.com"><img src="images/twitter.webp" alt="twitter"></a>
            <a href="https://instagram.com"> <img src="images/instagram.webp" alt="instagram"></a>

        </nav>
    </footer>
</body>

</html>
