<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test your knowledge of HTML and CSS with this interactive quiz form. Perfect for students and web development enthusiasts.">
    <meta name="author" content="Thomas Moses">
    <title>HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <h1>HTML and CSS Quiz</h1>
    <form action="/submit-quiz" method="post">
        <!-- Question 1: Text Input -->
        <div>
            <label for="q1">1. What does HTML stand for?</label><br>
            <input type="text" id="q1" name="q1">
        </div>
        <br>

        <!-- Question 2: Textarea -->
        <div>
            <label for="q2">2. Describe the purpose of CSS in a web page:</label><br>
            <textarea id="q2" name="q2" rows="4" cols="50"></textarea>
        </div>
        <br>

        <!-- Question 3: Select -->
        <div>
            <label for="q3">3. Which HTML element is used to define an internal style sheet?</label><br>
            <select id="q3" name="q3">
                <option value="" selected disabled>Choose One ...</option>
                <option value="style">&lt;style&gt;</option>
                <option value="script">&lt;script&gt;</option>
                <option value="css">&lt;css&gt;</option>
            </select>
        </div>
        <br>

        <!-- Question 4: Number Input -->
        <div>
            <label for="q4">4. How many HTML heading elements are there?</label><br>
            <input type="number" id="q4" name="q4">
        </div>
        <br>

        <button type="submit">Submit Quiz</button>
    </form>
</body>
</html>
